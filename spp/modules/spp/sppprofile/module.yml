module:
    name: sppprofile
    pubname: SPP Dynamic Profiles
    version: 1.1
    author: Satya Prakash Shukla
    pubdesc: Flexible profile extension system for any framework entity, allowing dynamic property expansion without schema alteration.
    modgroup: Core
    installation:
        tables:
            profiletabs:
                profname: "VARCHAR(100) NOT NULL PRIMARY KEY"
                proftabname: "VARCHAR(100)"
