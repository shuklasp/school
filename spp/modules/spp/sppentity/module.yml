module:
    name: sppentity
    version: '0.5'
    pubname: 'SPP Entity'
    modgroup: SPP_Optional
    pubdesc: 'Defines an Entity.'
    includes:
        - class.sppentity.php
        - entityexceptions.php
    deps:
        - sppconfig
    config_variables:
        - dbtype
        - dbuser
        - dbpasswd
        - dbhost
        - dbname
    settings:
        dbtype:
            type: text
            label: Dbtype
            default: mysql
        dbuser:
            type: text
            label: Dbuser
            default: root
        dbpasswd:
            type: password
            label: Dbpasswd
            default: hello123
        dbhost:
            type: text
            label: Dbhost
            default: localhost
        dbname:
            type: text
            label: Dbname
            default: school
