<div class="test-container">
    <h2>Drop and Play Test</h2>
    <form id="test_form" method="POST">
        <div class="row">
            <label>Name:</label>
            <input type="text" name="name" id="name_field" placeholder="Enter name">
            <span id="name_error"></span>
        </div>
        <div class="row">
            <label>Score:</label>
            <input type="text" name="score" id="score_field">
            <span id="score_error"></span>
        </div>
        <button type="submit">Submit</button>
    </form>
</div>
