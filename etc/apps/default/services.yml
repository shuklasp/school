# Application Service Registry
# Maps service names to scripts in /src/serv/ and constrains allowed HTTP methods.
# ONLY services listed here can be called from the client.
#
# Fields:
#   name    - Service identifier used in client calls: SPPRouter.callService('name', data)
#   script  - Script filename inside spa_service_dir (no path traversal allowed)
#   method  - Allowed HTTP method: GET or POST

services:
  - name: auth_login
    script: auth_login.php
    method: POST

